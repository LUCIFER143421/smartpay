spring:
  application:
    name: smartpay

  datasource:
    url: jdbc:postgresql://localhost:5432/smartpay
    username: postgres
    password: ${DB_PASSWORD:your_password_here}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080